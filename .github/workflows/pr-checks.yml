name: PR Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Smoke check
        run: bun run smoke

      - name: All tests
        run: bun run test:all

      - name: Trust baseline
        run: npm run check:trust-baseline

      - name: Typecheck supported surfaces
        run: npm run typecheck:supported

      - name: Install desktop and extension dependencies
        run: |
          npm install --prefix desktop --no-package-lock --ignore-scripts
          npm install --prefix extension --no-package-lock --ignore-scripts

      - name: Desktop & Extension typecheck
        run: npm run typecheck:desktop-extension

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true
