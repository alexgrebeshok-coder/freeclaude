name: PR Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Smoke check
        run: bun run smoke

      - name: Provider tests
        run: bun run test:provider

      - name: Background jobs tests
        run: bun test src/commands/jobs/jobs.test.ts

      - name: Memory store tests
        run: bun test src/services/memory/memoryStore.test.ts

      - name: Voice service tests
        run: bun test src/services/voice/*.test.ts

      - name: Provider recommendation tests
        run: npm run test:provider-recommendation

      - name: Task manager tests
        run: bun test src/services/tasks/taskManager.test.ts

      - name: Trust baseline
        run: npm run check:trust-baseline

      - name: Desktop & Extension typecheck
        run: npm run typecheck:desktop-extension
