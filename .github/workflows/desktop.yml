name: Desktop

on:
  pull_request:
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop.yml'
  push:
    branches: [main]
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop.yml'
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  ci:
    name: CI (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-13, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test -- --run

      - name: Package (unsigned, PR + non-tag)
        if: github.event_name != 'release'
        env:
          # Skip signing on PRs / pushes to main; tags trigger the release job below.
          APPLE_SIGNING_IDENTITY: ''
        run: npm run make

      - name: Upload unsigned artifacts
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: freeclaude-desktop-${{ matrix.os }}
          path: |
            desktop/out/make/**/*.dmg
            desktop/out/make/**/*.zip
          if-no-files-found: warn

  release:
    name: Sign + Notarize + Publish
    if: github.event_name == 'release'
    runs-on: macos-14
    timeout-minutes: 60
    needs: ci
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Import macOS code-signing certificate
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain

      - name: Build, sign, notarize, publish
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_RELEASE_OWNER: ${{ github.repository_owner }}
          GH_RELEASE_REPO: ${{ github.event.repository.name }}
          GH_RELEASE_DRAFT: '0'
        run: npm run publish
