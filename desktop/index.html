<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreeClaude</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #0d0d0d;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #252525;
      --text-primary: #e4e4e7;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --accent: #3b82f6;
      --accent-dim: #2563eb;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --border: #27272a;
      --radius: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag; user-select: none;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo {
      width: 24px; height: 24px; background: var(--accent);
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: white; font-weight: 700;
    }
    .header-title { font-weight: 600; font-size: 14px; }
    .header-version {
      font-size: 10px; color: var(--accent); background: rgba(59,130,246,0.15);
      padding: 2px 8px; border-radius: 10px; font-weight: 500;
    }
    .header-right { display: flex; gap: 4px; -webkit-app-region: no-drag; }
    .header-btn {
      background: none; border: 1px solid transparent; color: var(--text-secondary);
      cursor: pointer; padding: 4px 10px; border-radius: 6px; font-size: 12px;
      transition: all 0.15s;
    }
    .header-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); border-color: var(--border); }

    /* Main */
    .main { display: flex; flex-direction: column; height: calc(100vh - 41px); }

    /* Messages */
    .messages { flex: 1; overflow-y: auto; padding: 16px 20px; scroll-behavior: smooth; }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }

    .msg { margin-bottom: 16px; line-height: 1.65; font-size: 14px; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .msg-user {
      background: var(--bg-secondary); padding: 10px 14px;
      border-radius: 12px 12px 4px 12px; border-left: 3px solid var(--accent);
      max-width: 85%;
    }
    .msg-user .msg-label { font-size: 11px; color: var(--accent); font-weight: 600; margin-bottom: 4px; }

    .msg-assistant { padding: 4px 0; max-width: 95%; }
    .msg-assistant .msg-label { font-size: 11px; color: var(--green); font-weight: 600; margin-bottom: 4px; }

    .msg-system { color: var(--text-muted); font-size: 12px; font-style: italic; padding: 4px 0; }
    .msg-error { color: var(--red); padding: 8px 12px; background: rgba(239,68,68,0.08); border-radius: 8px; }

    .msg pre {
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 16px; margin: 8px 0;
      overflow-x: auto; font-family: 'JetBrains Mono', monospace; font-size: 13px;
      line-height: 1.5;
    }
    .msg code {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg-tertiary); padding: 1px 6px; border-radius: 4px; font-size: 13px;
    }
    .msg pre code { background: none; padding: 0; }

    /* Input */
    .input-area {
      display: flex; align-items: flex-end; gap: 10px;
      padding: 12px 16px; background: var(--bg-secondary);
      border-top: 1px solid var(--border);
    }
    .input-wrapper {
      flex: 1; display: flex; align-items: center;
      background: var(--bg-primary); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }
    .input-prompt {
      color: var(--green); font-family: 'JetBrains Mono', monospace;
      font-size: 14px; font-weight: 700; margin-right: 10px;
    }
    .input-field {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text-primary); font-family: 'JetBrains Mono', monospace;
      font-size: 14px; caret-color: var(--accent);
    }
    .input-field::placeholder { color: var(--text-muted); }
    .send-btn {
      background: var(--accent); border: none; color: white;
      padding: 10px 20px; border-radius: 10px; cursor: pointer;
      font-weight: 600; font-size: 13px; transition: all 0.15s;
      white-space: nowrap;
    }
    .send-btn:hover { background: var(--accent-dim); transform: translateY(-1px); }
    .send-btn:active { transform: translateY(0); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* Status */
    .status {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 16px; background: var(--bg-primary);
      border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted);
    }
    .status-left { display: flex; align-items: center; gap: 12px; }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%; display: inline-block;
    }
    .status-dot.connected { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.4); }
    .status-dot.disconnected { background: var(--red); }
    .status-dot.loading { background: var(--yellow); animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* Loading */
    .typing { display: flex; align-items: center; gap: 4px; padding: 8px 0; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-muted); animation: bounce 1.4s infinite ease-in-out;
    }
    .typing span:nth-child(1) { animation-delay: -0.32s; }
    .typing span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

    /* Sidebar (future) */
    .sidebar-toggle { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="header-logo">F</div>
      <span class="header-title">FreeClaude</span>
      <span class="header-version" id="versionBadge">v3.0.0</span>
    </div>
    <div class="header-right">
      <button class="header-btn" onclick="showProviders()">📡 Providers</button>
      <button class="header-btn" onclick="showCosts()">💰 Costs</button>
      <button class="header-btn" onclick="clearChat()">🗑 Clear</button>
    </div>
  </div>

  <div class="main">
    <div class="messages" id="messages">
      <div class="msg msg-system">
        FreeClaude v3.0.0 — Free AI coding agent. Multi-provider, no subscriptions.
        Type /help for commands.
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <span class="input-prompt">❯</span>
        <input class="input-field" id="input" placeholder="Ask anything or /command..." autofocus spellcheck="false" />
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send ↵</button>
    </div>

    <div class="status">
      <div class="status-left">
        <span class="status-dot connected" id="statusDot"></span>
        <span id="statusText">Ready</span>
      </div>
      <div id="metaInfo"></div>
    </div>
  </div>

  <script type="module">
    import { invoke } from '@tauri-apps/api/core';

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const metaInfo = document.getElementById('metaInfo');
    const versionBadge = document.getElementById('versionBadge');

    let isLoading = false;
    let isTauri = false;

    // Check Tauri
    try {
      if (window.__TAURI__) isTauri = true;
    } catch {}

    // Get version on load
    if (isTauri) {
      invoke('get_version').then(v => {
        versionBadge.textContent = v || 'v3.0.0';
      }).catch(() => {});
    }

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    function formatContent(text) {
      let h = escapeHtml(text);
      h = h.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
      h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
      h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      h = h.replace(/\n/g, '<br>');
      return h;
    }

    function addMessage(type, content) {
      const div = document.createElement('div');
      div.className = `msg msg-${type}`;
      if (type === 'user') {
        div.innerHTML = `<div class="msg-label">You</div><div>${escapeHtml(content)}</div>`;
      } else if (type === 'assistant') {
        div.innerHTML = `<div class="msg-label">FreeClaude</div><div>${formatContent(content)}</div>`;
      } else if (type === 'error') {
        div.textContent = content;
      } else {
        div.textContent = content;
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing'; div.id = 'typingIndicator';
      div.innerHTML = '<span></span><span></span><span></span>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    function hideTyping() { document.getElementById('typingIndicator')?.remove(); }

    function setLoading(on) {
      isLoading = on;
      sendBtn.disabled = on;
      inputEl.disabled = on;
      statusDot.className = `status-dot ${on ? 'loading' : 'connected'}`;
      statusText.textContent = on ? 'Thinking...' : 'Ready';
      if (on) showTyping(); else hideTyping();
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isLoading) return;
      inputEl.value = '';
      addMessage('user', text);

      // Local commands
      if (text.startsWith('/')) {
        const [cmd, ...rest] = text.split(' ');
        const arg = rest.join(' ');
        switch (cmd.toLowerCase()) {
          case '/help':
            addMessage('assistant', `**Commands:**\n/clear — Clear chat\n/help — This help\n/providers — Show providers\n/costs — Cost summary\n/remember — Save memory\n/version — FreeClaude version\n/exit — Quit`);
            return;
          case '/clear': clearChat(); return;
          case '/exit': window.close(); return;
          case '/providers': showProviders(); return;
          case '/costs': showCosts(); return;
          case '/version':
            if (isTauri) {
              invoke('get_version').then(v => addMessage('assistant', v));
            }
            return;
        }
      }

      setLoading(true);
      const startTime = Date.now();

      try {
        let response;
        if (isTauri) {
          response = await invoke('chat', { message: text });
        } else {
          await new Promise(r => setTimeout(r, 1200));
          response = 'Demo mode — Tauri not available.\n\nInstall: `cargo install freeclaude-desktop`';
        }
        addMessage('assistant', response);
        const ms = Date.now() - startTime;
        metaInfo.textContent = `${ms}ms`;
      } catch (err) {
        addMessage('error', `Error: ${err}`);
      } finally {
        setLoading(false);
        inputEl.focus();
      }
    }

    function clearChat() {
      messagesEl.innerHTML = '';
      addMessage('system', 'Chat cleared.');
    }

    async function showProviders() {
      if (!isTauri) { addMessage('system', 'Providers: run in Tauri desktop to see'); return; }
      try {
        const data = JSON.parse(await invoke('get_providers'));
        if (data.providers?.length) {
          let table = '**Providers:**\n';
          data.providers.forEach((p, i) => {
            table += `${i+1}. ${p.name} — ${p.model} — ${p.apiKey}\n`;
          });
          addMessage('assistant', table);
        } else {
          addMessage('system', 'No providers configured. Run /setup in CLI.');
        }
      } catch (e) { addMessage('error', `Failed: ${e}`); }
    }

    async function showCosts() {
      if (!isTauri) { addMessage('system', 'Costs: run in Tauri desktop to see'); return; }
      try {
        const data = JSON.parse(await invoke('get_costs'));
        addMessage('assistant',
          `**Cost Summary:**\nTotal: $${data.totalCost?.toFixed(4) || '0.0000'}\nRequests: ${data.totalRequests || 0}`
        );
      } catch (e) { addMessage('error', `Failed: ${e}`); }
    }

    // Make functions global for onclick handlers
    window.sendMessage = sendMessage;
    window.clearChat = clearChat;
    window.showProviders = showProviders;
    window.showCosts = showCosts;

    inputEl.focus();
  </script>
</body>
</html>
