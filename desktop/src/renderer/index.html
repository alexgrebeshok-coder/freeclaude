<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--
    Content Security Policy — single policy covering both dev and prod:

    script-src 'self':
      No 'unsafe-inline'. Vite produces static bundles (script type="module"),
      so inline scripts are never needed. In dev, the module is served from
      the Vite dev server which is 'self' for the renderer origin.

    style-src 'self' 'unsafe-inline':
      Tailwind/PostCSS injects CSS as <style> tags at build time and during
      HMR in dev. Removing 'unsafe-inline' here would break both dev and
      Tailwind's JIT mode. Trade-off: accepted for 1.0; revisit with nonces
      in P6 if a stricter policy is required.

    connect-src 'self' ws://127.0.0.1:* http://127.0.0.1:* http://localhost:* ws://localhost:*:
      Required for Vite HMR WebSocket in dev (ws://localhost:5173 etc.).
      In prod these local addresses have nothing listening so they are
      harmless while keeping a single shared HTML file.

    Everything else (img, font, media, object, frame) defaults to 'self'.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline';
    connect-src 'self' ws://127.0.0.1:* http://127.0.0.1:* http://localhost:* ws://localhost:*;
    img-src 'self' data:;
    font-src 'self' data:;
    object-src 'none';
    frame-src 'none';
    base-uri 'self';
    form-action 'self';
  ">
  <title>FreeClaude Desktop</title>
  <link rel="stylesheet" href="/styles/theme.css">
  <link rel="stylesheet" href="/styles/tailwind.css">
  <link rel="stylesheet" href="/styles/components.css">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/main.tsx"></script>
</body>
</html>
